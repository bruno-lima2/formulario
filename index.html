<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <title>Document</title>
  </head>
  <body>
    <input type="text" placeholder="Nome" class="form-control" />
    <div class="selecao">
      <select
        name="tipo_contato"
        id="tipo_contato"
        class="selecionar form-control"
      >
        <option value="" disabled selected>Tipo de contato</option>
        <option value="email">Email</option>
        <option value="celular">Celular</option>
        <option value="endereco">Endereço</option>
      </select>
      <button class="adicionar btn btn-primary">ADICIONAR</button>
    </div>
    <div class="campos"></div>
    <button class="enviar btn btn-success">ENVIAR</button>
    <script src="./script.js"></script>
  </body>
</html>
